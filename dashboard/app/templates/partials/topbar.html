{% from "components/icons.html" import icon %}

<header class="topbar">
  <div class="topbar-context" aria-label="현재 화면">
    {{ icon("layout-dashboard") }}
    <div>
      <span>현재 화면</span>
      <strong>{{ page_title }}</strong>
    </div>
  </div>

  <div class="topbar-actions">
    <span class="environment-pill">{{ environment | upper }}</span>
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 변경">
      <span class="theme-icon theme-icon-moon">{{ icon("moon") }}</span>
      <span class="theme-icon theme-icon-sun">{{ icon("sun") }}</span>
      <span data-theme-label>Dark</span>
    </button>
    <div class="profile-chip">
      <span class="profile-dot"></span>
      <strong>{{ current_access_role_label }}</strong>
    </div>
  </div>
</header>
