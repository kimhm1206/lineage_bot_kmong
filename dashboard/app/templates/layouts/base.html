<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}{{ app_name | default("Dashboard V2") }}{% endblock %}</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("dashboard-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = storedTheme || (prefersDark ? "dark" : "light");
      })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/dashboard.css') }}?v=20260723.27">
  </head>
  <body>
    {% block body %}{% endblock %}
    <script src="{{ url_for('static', path='/js/theme.js') }}" defer></script>
    <script src="{{ url_for('static', path='/js/user-picker-modal.js') }}?v=20260723.1" defer></script>
    <script src="{{ url_for('static', path='/js/operations.js') }}?v=20260723.14" defer></script>
    <script src="{{ url_for('static', path='/js/attendance.js') }}?v=20260723.1" defer></script>
    <script src="{{ url_for('static', path='/js/settings.js') }}?v=20260723.3" defer></script>
    <script src="{{ url_for('static', path='/js/treasury.js') }}?v=20260723.3" defer></script>
    <script src="{{ url_for('static', path='/js/navigation.js') }}?v=20260723.3" defer></script>
    <script src="{{ url_for('static', path='/js/developer-view.js') }}?v=20260723.3" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
